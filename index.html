<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sukhum Udom Rak School</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a252c; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: manipulation; }
        #app-container { width: 100%; max-width: 800px; height: 100%; max-height: 600px; background-color: #2c3e50; border-radius: 15px; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ANA MENÜ */
        #main-menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        h1 { color: #f1c40f; margin-bottom: 5px; font-size: 28px; }
        h2 { color: #ecf0f1; font-size: 18px; margin-bottom: 30px; }
        .character-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 90%; }
        .char-btn { background-color: #34495e; border: 3px solid; border-radius: 15px; padding: 20px; color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
        .char-btn.math { border-color: #e74c3c; } .char-btn.english { border-color: #3498db; }
        .char-btn.pe { border-color: #2ecc71; } .char-btn.principal { border-color: #9b59b6; }

        /* OYUN EKRANLARI */
        .game-screen { display: none; flex-direction: column; height: 100%; padding: 20px; position: relative; }
        .back-btn { position: absolute; top: 15px; left: 15px; background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 100; }
        .ui-bar { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; margin-top: 40px; margin-bottom: 10px; }
        .board { font-size: 20px; color: #f1c40f; text-align: center; margin-bottom: 20px; font-weight: bold; }
        
        /* POBMEK STİLLERİ */
        #pobmek-img { width: 120px; height: 120px; display: block; margin: 0 auto; object-fit: contain; }
        .students-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; justify-items: center; margin-top: 20px; }
        .student-img { width: 90px; height: 90px; background: rgba(255,255,255,0.1); border-radius: 10px; object-fit: contain; }
        .disabled { pointer-events: none; opacity: 0.7; }

        /* SODCHUEN STİLLERİ */
        .doors-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex-grow: 1; margin-top: 10px; }
        .door { background-color: #7f8c8d; border-radius: 10px; display: flex; justify-content: center; align-items: flex-end; overflow: hidden; position: relative; cursor: pointer; border: 4px solid #34495e; }
        .door img { width: 80%; height: 80%; object-fit: contain; display: none; /* Başta gizli */ transform: translateY(100%); transition: transform 0.1s; }
        .door img.show { display: block; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div id="main-menu">
            <h1>SUKHUM UDOM RAK SCHOOL</h1>
            <h2>Select a teacher to start!</h2>
            <div class="character-grid">
                <button class="char-btn math" onclick="loadGame('pobmek')">POBMEK<br><span style="font-size:14px;">Math - Find the Naughty</span></button>
                <button class="char-btn english" onclick="loadGame('solar')">SOLAR<br><span style="font-size:14px;">English - Protect Kids</span></button>
                <button class="char-btn pe" onclick="loadGame('jee')">JEE<br><span style="font-size:14px;">P.E. - Green Light</span></button>
                <button class="char-btn principal" onclick="loadGame('sodchuen')">SODCHUEN<br><span style="font-size:14px;">Principal - Catch Naughty</span></button>
            </div>
        </div>

        <div id="game-pobmek" class="game-screen">
            <button class="back-btn" onclick="goToMenu()">← BACK</button>
            <div class="ui-bar"><span id="p-score">Score: 0</span><span id="p-time">Time: --</span></div>
            <div id="pobmek-board" class="board">Ready?</div>
            <img id="pobmek-img" src="pobmek_back.png" alt="Pobmek">
            <div id="p-students" class="students-grid disabled">
                <img class="student-img" id="stu-0" onclick="checkPobmek(0)" src="student_normal.png">
                <img class="student-img" id="stu-1" onclick="checkPobmek(1)" src="student_normal.png">
                <img class="student-img" id="stu-2" onclick="checkPobmek(2)" src="student_normal.png">
                <img class="student-img" id="stu-3" onclick="checkPobmek(3)" src="student_normal.png">
            </div>
        </div>

        <div id="game-sodchuen" class="game-screen">
            <button class="back-btn" onclick="goToMenu()">← BACK</button>
            <div class="ui-bar"><span id="s-score">Score: 0</span><span id="s-time">Time: 30</span></div>
            <div id="sodchuen-board" class="board">Catch Naughty Students! Don't tap Teachers!</div>
            <div class="doors-grid">
                <div class="door" onclick="whack(0)"><img id="s-char-0" src=""></div>
                <div class="door" onclick="whack(1)"><img id="s-char-1" src=""></div>
                <div class="door" onclick="whack(2)"><img id="s-char-2" src=""></div>
                <div class="door" onclick="whack(3)"><img id="s-char-3" src=""></div>
                <div class="door" onclick="whack(4)"><img id="s-char-4" src=""></div>
                <div class="door" onclick="whack(5)"><img id="s-char-5" src=""></div>
            </div>
        </div>

        <div id="game-solar" class="game-screen"><button class="back-btn" onclick="goToMenu()">← BACK</button><h2 style="text-align:center; margin-top:60px;">Solar Coming Soon...</h2></div>
        <div id="game-jee" class="game-screen"><button class="back-btn" onclick="goToMenu()">← BACK</button><h2 style="text-align:center; margin-top:60px;">Jee Coming Soon...</h2></div>

    </div>

    <script>
        // --- MENÜ KONTROLÜ ---
        function loadGame(character) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-' + character).style.display = 'flex';
            
            if (character === 'pobmek') startPobmekGame();
            if (character === 'sodchuen') startSodchuenGame();
        }

        function goToMenu() {
            document.querySelectorAll('.game-screen').forEach(screen => screen.style.display = 'none');
            document.getElementById('main-menu').style.display = 'flex';
            
            // Oyunları Durdur
            clearTimeout(pobmekTimeout); clearInterval(pobmekTimer);
            clearInterval(sodchuenTimer); clearInterval(sodchuenSpawner);
        }

        // --- POBMEK OYUNU ---
        let pScore = 0, pTime = 0, naughtyIdx = -1, pMemTime = 3000, pGuessTime = 5;
        let pobmekTimer, pobmekTimeout;

        function startPobmekGame() {
            pScore = 0; pMemTime = 3000; pGuessTime = 5;
            document.getElementById('p-score').innerText = `Score: ${pScore}`;
            nextPobmekRound();
        }
        function nextPobmekRound() {
            document.getElementById('p-students').classList.add('disabled');
            document.getElementById('pobmek-img').src = "pobmek_back.png";
            document.getElementById('pobmek-board').innerText = "Memorize the class...";
            document.getElementById('p-time').innerText = "Time: --";
            naughtyIdx = -1;
            for (let i = 0; i < 4; i++) document.getElementById(`stu-${i}`).src = "student_normal.png";
            pobmekTimeout = setTimeout(turnPobmek, pMemTime);
        }
        function turnPobmek() {
            document.getElementById('p-students').classList.remove('disabled');
            document.getElementById('pobmek-img').src = "pobmek_front.png";
            document.getElementById('pobmek-board').innerText = "Find the naughty student!";
            naughtyIdx = Math.floor(Math.random() * 4);
            document.getElementById(`stu-${naughtyIdx}`).src = "student_naughty.png";
            pTime = pGuessTime;
            document.getElementById('p-time').innerText = `Time: ${pTime}`;
            pobmekTimer = setInterval(() => {
                pTime--; document.getElementById('p-time').innerText = `Time: ${pTime}`;
                if (pTime <= 0) { clearInterval(pobmekTimer); document.getElementById('pobmek-board').innerText = "GAME OVER!"; document.getElementById('p-students').classList.add('disabled'); }
            }, 1000);
        }
        function checkPobmek(index) {
            clearInterval(pobmekTimer);
            if (index === naughtyIdx) {
                pScore += 10; document.getElementById('p-score').innerText = `Score: ${pScore}`;
                document.getElementById('pobmek-board').innerText = "Good job!";
                if (pMemTime > 1000) pMemTime -= 200;
                pobmekTimeout = setTimeout(nextPobmekRound, 1500);
            } else {
                document.getElementById('pobmek-board').innerText = "GAME OVER - Wrong student!";
                document.getElementById('p-students').classList.add('disabled');
            }
        }

        // --- SODCHUEN OYUNU ---
        let sScore = 0, sTime = 30;
        let sodchuenTimer, sodchuenSpawner;
        let activeDoor = -1;

        function startSodchuenGame() {
            sScore = 0; sTime = 30;
            document.getElementById('s-score').innerText = `Score: ${sScore}`;
            document.getElementById('s-time').innerText = `Time: ${sTime}`;
            document.getElementById('sodchuen-board').innerText = "Catch Naughty Students!";
            
            // Tüm kapıları temizle
            for(let i=0; i<6; i++) document.getElementById(`s-char-${i}`).classList.remove('show');

            sodchuenTimer = setInterval(() => {
                sTime--; document.getElementById('s-time').innerText = `Time: ${sTime}`;
                if (sTime <= 0) {
                    clearInterval(sodchuenTimer); clearInterval(sodchuenSpawner);
                    document.getElementById('sodchuen-board').innerText = "GAME OVER!";
                    for(let i=0; i<6; i++) document.getElementById(`s-char-${i}`).classList.remove('show');
                }
            }, 1000);

            sodchuenSpawner = setInterval(spawnCharacter, 1200); // Her 1.2 saniyede bir karakter çıkar
        }

        function spawnCharacter() {
            if(activeDoor !== -1) document.getElementById(`s-char-${activeDoor}`).classList.remove('show');
            
            activeDoor = Math.floor(Math.random() * 6);
            let imgEl = document.getElementById(`s-char-${activeDoor}`);
            
            // %75 ihtimalle yaramaz öğrenci, %25 ihtimalle öğretmen (Pobmek) çıksın
            let isTeacher = Math.random() > 0.75; 
            
            imgEl.src = isTeacher ? "pobmek_front.png" : "student_naughty.png";
            imgEl.dataset.type = isTeacher ? "teacher" : "student";
            imgEl.classList.add('show');
        }

        function whack(index) {
            if(index === activeDoor) {
                let imgEl = document.getElementById(`s-char-${index}`);
                if(imgEl.dataset.type === "student") {
                    sScore += 10;
                    document.getElementById('s-score').innerText = `Score: ${sScore}`;
                    document.getElementById('sodchuen-board').innerText = "Got one!";
                } else if(imgEl.dataset.type === "teacher") {
                    sScore -= 10; // Öğretmene vurursan puan düşer!
                    document.getElementById('s-score').innerText = `Score: ${sScore}`;
                    document.getElementById('sodchuen-board').innerText = "Oops! Don't hit the teacher!";
                }
                imgEl.classList.remove('show');
                activeDoor = -1;
            }
        }
    </script>
</body>
</html>
